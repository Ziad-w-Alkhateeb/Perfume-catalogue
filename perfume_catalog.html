<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
    <base target="_blank">
</head>
<body>
    <!-- ===== TOP BAR ===== -->
    <div class="top-bar">
        <a href="#" class="logo-area">
            <img src="static/images/logo.webp" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <div class="logo-text">
                <span class="logo-title" data-i18n="logo">Essence Collection</span>
            </div>
        </a>
        <div class="top-actions">
            <button class="icon-btn" id="searchBtn" title="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
            <button class="icon-btn" id="settingsBtn" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </div>

    <!-- ===== SEARCH OVERLAY (SLIDE DOWN) ===== -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-box">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="Search perfumes..." data-i18n-placeholder="searchPlaceholder">
                <button class="search-clear-btn" id="searchClearBtn" title="Clear search">&times;</button>
            </div>
            <button class="icon-btn" id="searchCloseBtn" title="Close Search">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
    </div>

    <!-- ===== SETTINGS ===== -->
    <div class="settings-wrapper" id="settingsWrapper">
        <div class="settings-backdrop" id="settingsBackdrop"></div>
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <div class="settings-title" data-i18n="settings">Settings</div>
                <button class="settings-close" id="settingsClose">&times;</button>
            </div>
            <div class="settings-section">
                <div class="settings-label" data-i18n="appearance">Appearance</div>
                <div class="toggle-option" id="themeToggle">
                    <div class="toggle-label-wrapper">
                        <svg class="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
                        <span class="toggle-option-text" data-i18n="darkMode">Dark Mode</span>
                    </div>
                    <div class="toggle-switch" id="themeSwitch"></div>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-label" data-i18n="language">Language</div>
                <div class="toggle-option" id="langToggle">
                    <div class="toggle-label-wrapper">
                        <svg class="toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20"/><path d="M2 12h20"/></svg>
                        <span class="toggle-option-text" data-i18n="arabicLang">العربية</span>
                    </div>
                    <div class="toggle-switch" id="langSwitch"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== FILTERS BAR (categories from JSON files) ===== -->
    <div class="filters-bar" id="filtersBar">
        <button class="filter-chip active" data-filter="all" data-i18n="filterAll">All</button>
    </div>

    <!-- ===== STATS ===== -->
    <div class="stats-bar">
        <div><span id="showingCount">0</span> <span data-i18n="of">of</span> <span id="totalCount">0</span> <span data-i18n="perfumes">perfumes</span></div>
    </div>

    <!-- ===== GRID ===== -->
    <main class="container">
        <div class="perfume-grid" id="perfumeGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p data-i18n="loading">Loading fragrances...</p>
            </div>
        </div>
        <!-- ===== PAGINATION CONTROLS ===== -->
        <div class="pagination-container" id="paginationContainer"></div>
    </main>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose" title="Close modal">&times;</button>
            
            <div class="modal-container">
                <!-- Left Column: Premium Image Panel -->
                <div class="modal-image-panel">
                    <img class="modal-image" id="modalImage" src="" alt="" onerror="this.onerror=null; this.src='static/images/logo.webp';">
                </div>
                
                <!-- Right Column: Premium Details Panel -->
                <div class="modal-content-panel">
                    <div class="modal-header-section">
                        <h2 class="modal-title-en" id="modalTitleEn"></h2>
                        <div class="modal-title-ar" id="modalTitleAr"></div>
                    </div>
                    
                    <!-- Luxury Interactive Navigation Tabs -->
                    <div class="modal-tabs">
                        <button class="modal-tab-btn active" data-tab="overview" data-i18n="tabOverview">Overview</button>
                        <button class="modal-tab-btn" data-tab="notes" data-i18n="tabNotes">Scent Pyramid</button>
                        <button class="modal-tab-btn" data-tab="specs" data-i18n="tabSpecs">Specifications</button>
                    </div>
                    
                    <!-- Tab Panel 1: Story & Character (Overview) -->
                    <div class="modal-tab-panel active" id="panelOverview">
                        <div class="panel-section">
                            <h3 class="panel-section-title" data-i18n="descTitle">Fragrance Story</h3>
                            <p class="modal-desc" id="modalDesc"></p>
                        </div>
                        <div class="panel-section">
                            <h3 class="panel-section-title" data-i18n="characterTitle">Scent Character</h3>
                            <div class="modal-character-tag" id="modalCharacter"></div>
                        </div>
                    </div>
                    
                    <!-- Tab Panel 2: Olfactory Notes / Pyramid -->
                    <div class="modal-tab-panel" id="panelNotes">
                        <h3 class="panel-section-title" data-i18n="notesTitle">Olfactory Notes</h3>
                        <div class="notes-pyramid">
                            <div class="pyramid-tier">
                                <div class="tier-icon">🌱</div>
                                <div class="tier-content">
                                    <h4 class="tier-title" data-i18n="topNotes">Top Notes</h4>
                                    <p class="tier-values" id="modalNotesTop"></p>
                                </div>
                            </div>
                            <div class="pyramid-tier">
                                <div class="tier-icon">🌸</div>
                                <div class="tier-content">
                                    <h4 class="tier-title" data-i18n="heartNotes">Heart/Middle Notes</h4>
                                    <p class="tier-values" id="modalNotesHeart"></p>
                                </div>
                            </div>
                            <div class="pyramid-tier">
                                <div class="tier-icon">🪵</div>
                                <div class="tier-content">
                                    <h4 class="tier-title" data-i18n="baseNotes">Base Notes</h4>
                                    <p class="tier-values" id="modalNotesBase"></p>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Tab Panel 3: Technical Product Specifications -->
                    <div class="modal-tab-panel" id="panelSpecs">
                        <div class="modal-specs-grid">
                            <div class="spec-card">
                                <span class="spec-icon">🏢</span>
                                <div class="spec-details">
                                    <span class="spec-label" data-i18n="brandTitle">Manufacturer</span>
                                    <span class="spec-value" id="modalBrand"></span>
                                </div>
                            </div>
                            <div class="spec-card">
                                <span class="spec-icon">🏺</span>
                                <div class="spec-details">
                                    <span class="spec-label" data-i18n="labelCollection">Collection</span>
                                    <span class="spec-value" id="modalCollection"></span>
                                </div>
                            </div>
                            <div class="spec-card">
                                <span class="spec-icon">🧪</span>
                                <div class="spec-details">
                                    <span class="spec-label" data-i18n="labelType">Type</span>
                                    <span class="spec-value" id="modalType"></span>
                                </div>
                            </div>
                            <div class="spec-card">
                                <span class="spec-icon">🏷️</span>
                                <div class="spec-details">
                                    <span class="spec-label" data-i18n="labelCode">Product Code</span>
                                    <span class="spec-value" id="modalNum"></span>
                                </div>
                            </div>
                            <div class="spec-card">
                                <span class="spec-icon">👥</span>
                                <div class="spec-details">
                                    <span class="spec-label" data-i18n="labelGender">Gender</span>
                                    <span class="spec-value" id="modalGender"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                </div>
            </div>
            
        </div>
    </div>

    <!-- Decoupled Scripts -->
    <script src="static/js/i18n.js" defer></script>
    <script src="static/js/app.js" defer></script>
</body>
</html>
