<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essence Collection</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Noto+Naskh+Arabic:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="static/css/styles.css">
    <base target="_blank">
</head>
<body>
    <!-- ===== TOP BAR ===== -->
    <div class="top-bar">
        <a href="#" class="logo-area">
            <img src="static/images/logo.webp" alt="Logo" class="logo-img" onerror="this.style.display='none'">
            <div class="logo-text">
                <span class="logo-title" data-i18n="logo">Essence Collection</span>
            </div>
        </a>
        <div class="top-actions">
            <button class="icon-btn" id="searchBtn" title="Search">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            </button>
            <button class="icon-btn" id="settingsBtn" title="Settings">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
        </div>
    </div>

    <!-- ===== SEARCH OVERLAY ===== -->
    <div class="search-overlay" id="searchOverlay">
        <div class="search-box">
            <div class="search-input-wrapper">
                <input type="text" id="searchInput" placeholder="Search perfumes..." data-i18n-placeholder="searchPlaceholder">
            </div>
            <div class="search-hint" data-i18n="searchHint">Type to search instantly &bull; ESC to close</div>
        </div>
    </div>

    <!-- ===== SETTINGS ===== -->
    <div class="settings-wrapper" id="settingsWrapper">
        <div class="settings-backdrop" id="settingsBackdrop"></div>
        <div class="settings-panel" id="settingsPanel">
            <div class="settings-header">
                <div class="settings-title" data-i18n="settings">Settings</div>
                <button class="settings-close" id="settingsClose">&times;</button>
            </div>
            <div class="settings-section">
                <div class="settings-label" data-i18n="appearance">Appearance</div>
                <div class="toggle-option" id="themeToggle">
                    <span class="toggle-option-text" data-i18n="darkMode">Dark Mode</span>
                    <div class="toggle-switch" id="themeSwitch"></div>
                </div>
            </div>
            <div class="settings-section">
                <div class="settings-label" data-i18n="language">Language</div>
                <div class="toggle-option" id="langToggle">
                    <span class="toggle-option-text" data-i18n="arabicLang">العربية</span>
                    <div class="toggle-switch" id="langSwitch"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== FILTERS BAR (categories from JSON files) ===== -->
    <div class="filters-bar" id="filtersBar">
        <button class="filter-chip active" data-filter="all" data-i18n="filterAll">All</button>
    </div>

    <!-- ===== STATS ===== -->
    <div class="stats-bar">
        <div><span id="showingCount">0</span> <span data-i18n="of">of</span> <span id="totalCount">0</span> <span data-i18n="perfumes">perfumes</span></div>
    </div>

    <!-- ===== GRID ===== -->
    <main class="container">
        <div class="perfume-grid" id="perfumeGrid">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p data-i18n="loading">Loading fragrances...</p>
            </div>
        </div>
    </main>

    <!-- ===== MODAL ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <button class="modal-close" id="modalClose">&times;</button>
            <img class="modal-image" id="modalImage" src="" alt="">
            <div class="modal-body">
                <h2 class="modal-title-en" id="modalTitleEn"></h2>
                <div class="modal-title-ar" id="modalTitleAr"></div>
                <div class="modal-price" id="modalPrice"></div>
                <div class="modal-details">
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="labelGender">Gender</div>
                        <div class="detail-value" id="modalGender"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="labelType">Type</div>
                        <div class="detail-value" id="modalType"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="labelCode">Product Code</div>
                        <div class="detail-value" id="modalNum"></div>
                    </div>
                    <div class="detail-item">
                        <div class="detail-label" data-i18n="labelCollection">Collection</div>
                        <div class="detail-value" id="modalCollection"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Decoupled Scripts -->
    <script src="static/js/i18n.js" defer></script>
    <script src="static/js/app.js" defer></script>
</body>
</html>
